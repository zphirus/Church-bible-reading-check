<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교회 성경읽기 플래너</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f4efe6;
padding:15px;
}

h1{
text-align:center;
font-size:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

select,input{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#6b8e23;
color:white;
font-weight:bold;
}

.today{
font-size:18px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.reading{
text-align:center;
font-size:16px;
margin-top:5px;
color:#444;
}

.progress-bar{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress-fill{
height:100%;
background:#3a7d44;
width:0%;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:10px;
}

.day{
padding:8px 0;
text-align:center;
border-radius:8px;
background:#eee;
font-size:12px;
}

.day.checked{
background:#3a7d44;
color:white;
}
</style>
</head>

<body>

<h1>📖 교회 성경읽기 플래너</h1>

<div class="card">

<label>시작 날짜</label>
<input type="date" id="startDate">

<label>기간</label>
<select id="planDays">
<option value="365">1년</option>
<option value="730">2년</option>
<option value="1095">3년</option>
</select>

<label>목표 독수</label>
<select id="targetReads">
<option value="1">1독</option>
<option value="2">2독</option>
<option value="3">3독</option>
<option value="4">4독</option>
<option value="5">5독</option>
</select>

<button onclick="saveSettings()">저장</button>

</div>


<div class="card">

<div class="today" id="todayReading"></div>
<div class="reading" id="readingRange"></div>

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

<div id="stats"></div>

</div>


<div class="card">
📅 이번 달 체크
<div class="calendar" id="calendar"></div>
</div>



<script>

const bibleBooks=[
["창세기",50],["출애굽기",40],["레위기",27],["민수기",36],["신명기",34],
["여호수아",24],["사사기",21],["룻기",4],["사무엘상",31],["사무엘하",24],
["열왕기상",22],["열왕기하",25],["역대상",29],["역대하",36],["에스라",10],
["느헤미야",13],["에스더",10],["욥기",42],["시편",150],["잠언",31],
["전도서",12],["아가",8],["이사야",66],["예레미야",52],["예레미야애가",5],
["에스겔",48],["다니엘",12],["호세아",14],["요엘",3],["아모스",9],
["오바댜",1],["요나",4],["미가",7],["나훔",3],["하박국",3],
["스바냐",3],["학개",2],["스가랴",14],["말라기",4],
["마태복음",28],["마가복음",16],["누가복음",24],["요한복음",21],
["사도행전",28],["로마서",16],["고린도전서",16],["고린도후서",13],
["갈라디아서",6],["에베소서",6],["빌립보서",4],["골로새서",4],
["데살로니가전서",5],["데살로니가후서",3],["디모데전서",6],
["디모데후서",4],["디도서",3],["빌레몬서",1],["히브리서",13],
["야고보서",5],["베드로전서",5],["베드로후서",3],["요한일서",5],
["요한이서",1],["요한삼서",1],["유다서",1],["요한계시록",22]
];

let chapters=[];
bibleBooks.forEach(b=>{
for(let i=1;i<=b[1];i++){
chapters.push(b[0]+" "+i+"장");
}
});

const TOTAL_CHAPTERS=1189;

let data=JSON.parse(localStorage.getItem("bibleData"))||{
startDate:null,
planDays:365,
targetReads:1,
readIndex:0,
checkedDays:{}
};

function saveSettings(){
data.startDate=document.getElementById("startDate").value;
data.planDays=parseInt(document.getElementById("planDays").value);
data.targetReads=parseInt(document.getElementById("targetReads").value);
save();
update();
}

function update(){

if(!data.startDate)return;

const start=new Date(data.startDate);
const end=new Date(start);
end.setDate(start.getDate()+data.planDays);

const today=new Date();

const totalGoal=TOTAL_CHAPTERS*data.targetReads;

const remainingChapters=totalGoal-data.readIndex;

const remainingDays=Math.max(1,Math.ceil((end-today)/86400000));

const daily=Math.ceil(remainingChapters/remainingDays);

// 오늘 읽을 장 수 표시
document.getElementById("todayReading").innerText=
"오늘 읽기 "+daily+"장";

// 성경 위치 계산 (독수 반복 가능)
const startIndex=data.readIndex % chapters.length;
const endIndex=(data.readIndex+daily-1) % chapters.length;

document.getElementById("readingRange").innerText=
chapters[startIndex]+" ~ "+chapters[endIndex];

// 진행률
const percent=(data.readIndex/totalGoal)*100;
document.getElementById("progressFill").style.width=percent+"%";

// 통계
document.getElementById("stats").innerHTML=
"읽은 장 "+data.readIndex+
"<br>남은 장 "+remainingChapters+
"<br>남은 일 "+remainingDays;

renderCalendar(daily);

}

function renderCalendar(daily){

const cal=document.getElementById("calendar");
cal.innerHTML="";

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth();

const lastDay=new Date(year,month+1,0).getDate();

for(let i=1;i<=lastDay;i++){

const date=new Date(year,month,i);
const key=date.toISOString().split("T")[0];

const d=document.createElement("div");
d.className="day";
d.innerText=i;

if(data.checkedDays[key])d.classList.add("checked");

d.onclick=function(){

if(data.checkedDays[key]){
delete data.checkedDays[key];
data.readIndex=Math.max(0,data.readIndex+daily);
}else{
data.checkedDays[key]=true;
data.readIndex+=daily;
}

save();
update();

};

cal.appendChild(d);

}

}

function save(){
localStorage.setItem("bibleData",JSON.stringify(data));
}

window.onload=function(){

if(data.startDate)
document.getElementById("startDate").value=data.startDate;

document.getElementById("planDays").value=data.planDays;
document.getElementById("targetReads").value=data.targetReads;

update();

}

</script>

</body>
</html>
